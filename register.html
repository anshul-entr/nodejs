<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚛 Emergency Ola - Vehicle Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #dc3545, #a71e2a);
      color: white; 
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 50px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255,107,107,0.5);
    }
    
    .subtitle {
      text-align: center;
      opacity: 0.9;
      margin-bottom: 40px;
      font-size: 1.2rem;
    }
    
    .form-control, .form-select {
      border-radius: 15px;
      background: rgba(255,255,255,0.95);
      border: none;
      font-size: 16px;
      color: #333;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }
    
    .form-control:focus, .form-select:focus {
      outline: none;
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.2);
      background: white;
      border-color: #dc3545;
      box-shadow: 0 0 0 0.2rem rgba(220,53,69,0.25);
    }
    
    .register-btn {
      width: 100%;
      padding: 20px;
      background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255,107,107,0.4);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .register-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(255,107,107,0.6);
    }
    
    .register-btn:active {
      transform: translateY(-1px);
    }
    
    .vehicle-list {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
    }
    
    .vehicle-item {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    /* Success Popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    
    .popup-content {
      background: linear-gradient(135deg, #28a745, #20c997);
      padding: 50px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 25px 80px rgba(40,167,69,0.4);
      animation: popIn 0.5s ease;
      max-width: 400px;
      width: 90%;
    }
    
    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .close-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 15px 40px;
      border-radius: 15px;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }
    
    .close-btn:hover { 
      background: rgba(255,255,255,0.3); 
      transform: translateY(-2px); 
    }

    @media (max-width: 600px) {
      .container { padding: 30px 20px; margin: 20px; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-truck-medical me-3"></i>Vehicle Registration</h1>
    <p class="subtitle">Register your emergency vehicle with Emergency Ola <br><small id="vehicleCount">0 vehicles registered</small></p>
    
    <form id="vehicleForm">
      <div class="mb-3">
        <label class="form-label fw-bold">Owner Name *</label>
        <input type="text" class="form-control" id="ownerName" placeholder="Enter full name" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label fw-bold">Phone Number *</label>
        <input type="tel" class="form-control" id="phone" placeholder="9876543210" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label fw-bold">Email *</label>
        <input type="email" class="form-control" id="email" placeholder="driver@email.com" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label fw-bold">Emergency Contact *</label>
        <input type="tel" class="form-control" id="emergencyContact" placeholder="Control Room" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label fw-bold">Location/Base *</label>
        <input type="text" class="form-control" id="location" placeholder="Nagpur Hospital" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label fw-bold">Vehicle Type *</label>
        <select class="form-select" id="vehicleType" required>
          <option value="">Select Vehicle Type</option>
          <option value="Ambulance">🚑 Ambulance</option>
          <option value="Police Car">🚔 Police Car</option>
          <option value="Police Van">🚓 Police Van</option>
          <option value="Fire Brigade">🚒 Fire Brigade</option>
          <option value="Helicopter">🚁 Helicopter</option>
          <option value="Rescue Ship">🚢 Rescue Ship</option>
        </select>
      </div>
      
      <div class="mb-3">
        <label class="form-label fw-bold">Registration Number *</label>
        <input type="text" class="form-control" id="regNumber" placeholder="MH04AB1234" required>
      </div>
      
      <button type="submit" class="register-btn btn btn-danger btn-lg">
        <i class="fas fa-check me-2"></i>Register Vehicle
      </button>
    </form>

    <div id="registeredList" class="vehicle-list mt-4" style="display: none;">
      <h5 class="mb-3"><i class="fas fa-list me-2"></i>Registered Vehicles</h5>
      <div id="vehicleItems"></div>
    </div>
  </div>
  
  <!-- Success Popup -->
  <div id="successPopup" class="popup">
    <div class="popup-content">
      <i class="fas fa-check-circle fa-4x mb-3 text-white"></i>
      <h2>✅ Registration Successful!</h2>
      <p id="popupMessage">Your vehicle has been registered with Emergency Ola.</p>
      <p>Registration ID: <strong id="regId"></strong></p>
      <button class="close-btn btn btn-light" onclick="closePopup()">
        <i class="fas fa-tachometer-alt me-2"></i>Go to Dashboard
      </button>
    </div>
  </div>

  <script>
    let registrationCounter = parseInt(localStorage.getItem('regCounter') || '1000');
    
    // Load and display existing vehicles
    function loadVehicles() {
      const vehicles = JSON.parse(localStorage.getItem('registeredVehicles') || '[]');
      document.getElementById('vehicleCount').textContent = `${vehicles.length} vehicles registered`;
      
      if (vehicles.length > 0) {
        document.getElementById('registeredList').style.display = 'block';
        const itemsContainer = document.getElementById('vehicleItems');
        itemsContainer.innerHTML = vehicles.slice(-5).map(v => `
          <div class="vehicle-item">
            <div>
              <strong>${v.type}</strong> - ${v.regNo}<br>
              <small>${v.owner} • ${new Date(v.date).toLocaleDateString()}</small>
            </div>
            <span class="badge bg-success">${v.id}</span>
          </div>
        `).join('');
      }
    }
    
    const form = document.getElementById('vehicleForm');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const formData = {
        ownerName: document.getElementById('ownerName').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        emergencyContact: document.getElementById('emergencyContact').value.trim(),
        location: document.getElementById('location').value.trim(),
        vehicleType: document.getElementById('vehicleType').value,
        regNumber: document.getElementById('regNumber').value.trim().toUpperCase()
      };
      
      // Validation
      if (!formData.ownerName || !formData.vehicleType || !formData.regNumber || !formData.phone.match(/^\d{10}$/)) {
        alert('Please fill all required fields correctly! Phone must be 10 digits.');
        return;
      }
      
      // Generate registration
      registrationCounter++;
      const regId = `EOLA-${registrationCounter.toString().padStart(4, '0')}`;
      
      // Save to localStorage
      const vehicles = JSON.parse(localStorage.getItem('registeredVehicles') || '[]');
      vehicles.push({
        id: regId,
        owner: formData.ownerName,
        type: formData.vehicleType,
        regNo: formData.regNumber,
        phone: formData.phone,
        location: formData.location,
        date: new Date().toLocaleString()
      });
      localStorage.setItem('registeredVehicles', JSON.stringify(vehicles));
      localStorage.setItem('regCounter', registrationCounter);
      
      // Show popup
      document.getElementById('popupMessage').textContent = `✅ ${formData.ownerName}, your ${formData.vehicleType} (${formData.regNumber}) has been registered!`;
      document.getElementById('regId').textContent = regId;
      document.getElementById('successPopup').style.display = 'flex';
      
      // Reset form
      form.reset();
      
      // Reload list
      loadVehicles();
    });
    
    function closePopup() {
      document.getElementById('successPopup').style.display = 'none';
      window.location.href = 'index .html';
    }
    
    // Initial load
    loadVehicles();
  </script>
</body>
</html>
