<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Ola - Police Ambulance Helicopter Booking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #0a0a1f 0%, #1a1a3a 50%, #2d0b1e 100%);
      color: white; 
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Landing Emergency Screen */
    .landing {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }
    .siren { font-size: 10vw; animation: flash 0.8s infinite; filter: drop-shadow(0 0 30px #ff0040); }
    @keyframes flash { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
    .title { font-size: clamp(2.5rem, 8vw, 5rem); margin: 20px 0; text-shadow: 0 0 40px #ff0040; animation: glow 2s infinite alternate; }
    @keyframes glow { 0% { filter: brightness(1); } 100% { filter: brightness(1.3); } }
    
    .emergency-btn {
      font-size: clamp(2rem, 6vw, 4rem);
      background: conic-gradient(from 0deg, #ff0040, #ff4080, #ff0040);
      color: white; border: none; padding: clamp(25px, 5vw, 50px) clamp(50px, 10vw, 100px);
      border-radius: 100px; cursor: pointer; margin: 30px 0;
      box-shadow: 0 0 60px #ff0040; animation: pulse 1.5s infinite;
      transition: all 0.4s ease; font-weight: bold; text-transform: uppercase;
      letter-spacing: 3px;
    }
    @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 40px #ff0040; } 50% { transform: scale(1.05); box-shadow: 0 0 80px #ff0040; } }
    .emergency-btn:hover { transform: scale(1.1); box-shadow: 0 0 100px #ff4080; }
    
    .enter-btn {
      background: linear-gradient(45deg, #00d4ff, #0099cc); padding: 20px 60px; border: none;
      border-radius: 50px; color: white; font-size: 1.4rem; font-weight: bold; cursor: pointer;
      box-shadow: 0 10px 40px rgba(0,212,255,0.4); transition: all 0.3s;
    }
    .enter-btn:hover { transform: translateY(-5px); box-shadow: 0 20px 60px rgba(0,212,255,0.6); }
    
    /* Loading */
    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; justify-content: center; align-items: center; }
    .spinner { width: 60px; height: 60px; border: 6px solid rgba(255,0,64,0.3); border-top: 6px solid #ff0040; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Dashboard */
    .dashboard { padding: 40px 20px; max-width: 1400px; margin: 0 auto; display: none; }
    .header-buttons { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
    .header-emergency { 
      background: radial-gradient(circle, #ff0040, #cc0033); padding: 25px 40px; border-radius: 25px; 
      text-align: center; cursor: pointer; box-shadow: 0 15px 50px rgba(255,0,64,0.4);
      animation: bounce 2s infinite; font-size: 1.8rem; font-weight: bold; flex: 1; min-width: 200px;
    }
    .register-btn-header {
      background: linear-gradient(45deg, #f59e0b, #d97706); padding: 25px 40px; border-radius: 25px;
      text-decoration: none; color: white; font-weight: bold; font-size: 1.6rem; text-align: center;
      box-shadow: 0 15px 50px rgba(245,158,11,0.4); flex: 1; min-width: 200px;
    }
    .register-btn-header:hover { transform: translateY(-5px); box-shadow: 0 25px 60px rgba(245,158,11,0.6); }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-10px); } }
    
    .emergency-form { 
      background: rgba(255,255,255,0.1); padding: 40px; border-radius: 25px; margin: 40px 0; 
      backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); text-align: center;
    }
    .emergency-form h2 { font-size: 2.5rem; margin-bottom: 30px; text-shadow: 0 0 20px #ff0040; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 30px; }
    select { padding: 20px; border: none; border-radius: 15px; background: rgba(255,255,255,0.9); font-size: 18px; color: #333; }
    .book-now { background: linear-gradient(45deg, #ff0040, #ff4080); color: white; border: none; padding: 25px 60px; border-radius: 20px; font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 15px 40px rgba(255,0,64,0.5); transition: all 0.3s; }
    .book-now:hover { transform: translateY(-8px); box-shadow: 0 25px 60px rgba(255,0,64,0.7); }
    
    .vehicles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin: 50px 0; }
    .vehicle-card { 
      background: rgba(255,255,255,0.15); padding: 35px; border-radius: 25px; text-align: center; 
      backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); transition: all 0.4s;
      animation: slideUp 0.6s ease forwards;
    }
    .vehicle-card:hover { transform: translateY(-15px) rotate(2deg); box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } }
    .vehicle-icon { font-size: 5rem; margin-bottom: 20px; }
    .vehicle-name { font-size: 2rem; margin-bottom: 15px; color: #ff4080; }
    
    .bookings { background: rgba(0,0,0,0.4); padding: 40px; border-radius: 25px; margin-top: 50px; }
    .booking-item { background: rgba(255,0,64,0.2); padding: 25px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    
    .registered-vehicle {
      background: rgba(16,185,129,0.3); padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center;
      border: 2px solid #10b981; animation: slideIn 0.5s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } }
    
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } .vehicles-grid { grid-template-columns: 1fr; } .header-buttons { flex-direction: column; } }
  </style>
</head>
<body>
  <!-- Landing -->
  <div class="landing" id="landing">
    <div class="siren">🚨</div>
    <h1 class="title">Emergency Ola</h1>
    <p style="font-size: 1.8rem; margin-bottom: 50px; opacity: 0.95;">Your 24/7 Emergency Response Partner</p>
    <button class="emergency-btn" onclick="sendEmergency()">
      🚨 EMERGENCY ALERT
    </button>
    <button class="enter-btn" onclick="goToDashboard()">
      Enter Dashboard →
    </button>
  </div>
  
  <!-- Loading Overlay -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
  </div>
  
  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="header-buttons">
      <div class="header-emergency" onclick="quickEmergency()">
        🚨 EMERGENCY
      </div>
      <a href="register.html" class="register-btn-header">
        🚛 Register Vehicle
      </a>
      <a href="admin.html" class="register-btn-header" style="background: linear-gradient(45deg, #6b46c1, #9f7aea);">
        🔐 Admin Panel
      </a>
    </div>
    
    <div class="emergency-form">
      <h2>🚨 Report Emergency</h2>
      <div id="registeredInfo" class="registered-vehicle" style="display:none;"></div>
      <div class="form-row">
        <select id="emergencyType">
          <option>Select Emergency Type</option>
          <option>Fight</option>
          <option>Fire</option>
          <option>Disaster</option>
          <option>Flood</option>
          <option>Accident</option>
          <option>Medical Emergency</option>
        </select>
        <select id="vehicleType">
          <option>Select Vehicle</option>
          <option>Ambulance</option>
          <option>Police Car</option>
          <option>Police Van</option>
          <option>Fire Brigade</option>
          <option>Helicopter</option>
          <option>Rescue Ship</option>
        </select>
      </div>
      <button class="book-now" onclick="dispatchVehicle()">
        🚨 DISPATCH NOW
      </button>
    </div>
    
    <div class="vehicles-grid" id="vehicles">
      <!-- Vehicles load here -->
    </div>
    
    <div class="bookings">
      <h2>📋 Recent Dispatches</h2>
      <div id="bookingsList">
        <p>Loading...</p>
      </div>
    </div>
  </div>

  <script>
    let bookings = JSON.parse(localStorage.getItem('emergencyBookings') || '[]');
    
    function sendEmergency() {
      navigator.geolocation.getCurrentPosition(pos => {
        alert(`🚨 EMERGENCY SENT!\n📍 GPS: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}\n✅ SMS dispatched to nearest vehicles`);
        showLoading();
        setTimeout(showDashboard, 2500);
      }, () => {
        alert('🚨 EMERGENCY SENT (Demo location)');
        showLoading();
        setTimeout(showDashboard, 2000);
      });
    }
    
    function quickEmergency() {
      navigator.geolocation.getCurrentPosition(pos => {
        alert('🚨 QUICK EMERGENCY DISPATCHED!\nGPS sent to vehicles');
      }, () => alert('🚨 QUICK EMERGENCY SENT!'));
      addSampleBooking('Quick Emergency', 'Ambulance', '4min');
    }
    
    function dispatchVehicle() {
      const emergency = document.getElementById('emergencyType').value;
      const vehicle = document.getElementById('vehicleType').value;
      if (!emergency || !vehicle) return alert('Select both fields!');
      
      const etas = ['3min', '5min', '7min', '4min', '6min'];
      const eta = etas[Math.floor(Math.random() * etas.length)];
      alert(`🚨 DISPATCHED!\n${emergency.toUpperCase()}\n${vehicle.toUpperCase()}\n📍 COMING FAST - ETA ${eta}`);
      
      addSampleBooking(emergency, vehicle, eta);
    }
    
    function addSampleBooking(emergency, vehicle, eta) {
      bookings.unshift({
        id: Date.now(),
        emergency,
        vehicle,
        eta,
        time: new Date().toLocaleString(),
        status: 'Dispatched - En Route!'
      });
      localStorage.setItem('emergencyBookings', JSON.stringify(bookings));
      renderBookings();
    }
    
    function showLoading() { document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }
    
    function showDashboard() {
      hideLoading();
      document.getElementById('landing').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderBookings();
      loadRegisteredVehicles();
      setTimeout(showRegisteredVehicle, 500);
    }
    
    function goToDashboard() {
      showLoading();
      setTimeout(showDashboard, 1500);
    }
    
function showRegisteredVehicle() {
      const vehicles = JSON.parse(localStorage.getItem('registeredVehicles') || '[]');
      if (vehicles.length > 0) {
        const infoDiv = document.getElementById('registeredInfo');
        infoDiv.innerHTML = `
          <strong>📋 ${vehicles.length} Vehicles Registered</strong><br>
          ${vehicles.slice(0,2).map(v => `
            ✅ ${v.type} - ${v.regNo}<br>
            <small>${v.owner} (${v.location})</small>
          `).join('<br>')}<br><br>
          <a href="register.html" style="color: #10b981; font-weight: bold;">➕ Add More</a> |
          <a href="admin.html" style="color: #9f7aea; font-weight: bold;">🔐 Manage</a>
        `;
        infoDiv.style.display = 'block';
      }
    }
    
    function renderBookings() {
      const list = document.getElementById('bookingsList');
      if (bookings.length === 0) {
        list.innerHTML = '<p>No dispatches yet. Report emergency above!</p>';
        return;
      }
      list.innerHTML = bookings.slice(0, 5).map(b => `
        <div class="booking-item">
          <div>
            <strong>${b.emergency}</strong> - ${b.vehicle}<br>
            <small>${b.time} • ETA ${b.eta}</small>
          </div>
          <button onclick="cancelBooking(${b.id})" style="background:#ef4444;padding:10px 20px;border:none;border-radius:8px;color:white;cursor:pointer;">Cancel</button>
        </div>
      `).join('');
    }
    
    function cancelBooking(id) {
      bookings = bookings.filter(b => b.id !== id);
      localStorage.setItem('emergencyBookings', JSON.stringify(bookings));
      renderBookings();
      alert('Dispatch cancelled');
    }
    
function loadRegisteredVehicles() {
      const vehicles = JSON.parse(localStorage.getItem('registeredVehicles') || '[]');
      const emojis = {
        'Ambulance': '🚑',
        'Police Car': '🚔',
        'Police Van': '🚓',
        'Fire Brigade': '🚒',
        'Helicopter': '🚁',
        'Rescue Ship': '🚢'
      };
      if (vehicles.length > 0) {
        document.getElementById('vehicles').innerHTML = vehicles.map(v => 
          `<div class="vehicle-card">
            <div style="font-size:3rem;margin-bottom:15px;">${emojis[v.type] || '🚛'}</div>
            <h3>${v.regNo} - ${v.type}</h3>
            <p>${v.owner} • ${v.location} • ${v.phone}</p>
            <small>ID: ${v.id}</small>
            <button onclick="dispatchVehicle()" style="background:#22c55e;color:white;padding:15px 30px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px;">Book Now</button>
          </div>`
        ).join('');
      } else {
        loadDefaultVehicles();
      }
    }
    
    // Auto refresh every 10s
    setInterval(loadRegisteredVehicles, 10000);
    
    function loadDefaultVehicles() {
      const vehicles = [
        '🚑 Ambulance - Nagpur Hospital - ₹25/km',
        '🚔 Police Car - Amravati Station - ₹20/km',
        '🚒 Fire Brigade - Pune Station - ₹35/km'
      ];
      document.getElementById('vehicles').innerHTML = vehicles.map(v => 
        `<div class="vehicle-card">
          <div style="font-size:3rem;margin-bottom:15px;">${v.split(' ')[0]}</div>
          <h3>${v.split(' - ')[0].substring(2)}</h3>
          <p>${v.split(' - ')[1]}</p>
          <button onclick="dispatchVehicle()" style="background:#22c55e;color:white;padding:15px 30px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;">Book Now</button>
        </div>`
      ).join('');
    }
    
    // Auto load sample bookings
    if (bookings.length === 0) {
      bookings = [
        { id: 1, emergency: 'Fire', vehicle: 'Fire Brigade', eta: '5min', time: '2min ago', status: 'En Route' },
        { id: 2, emergency: 'Medical', vehicle: 'Ambulance', eta: '7min', time: '10min ago', status: 'Completed' }
      ];
      localStorage.setItem('emergencyBookings', JSON.stringify(bookings));
    }
  </script>
</body>
</html>
